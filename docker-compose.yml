networks:
  dev:
    driver: bridge
services:
  nctl-init:
    image: busybox
    user: "0"
    command: ["chmod", "777", "/nctl-keys"]
    volumes:
      - nctl-keys:/nctl-keys
    networks: [dev]
  # ── Casper local network ──────────────────────────────────────────────────
  nctl:
    image: makesoftware/casper-nctl:v203
    networks: [dev]
    cpus: 1
    depends_on:
      nctl-init:
        condition: service_completed_successfully
    ports:
      - "11101:11101"
      - "14101:14101"
      - "18101:18101"
      - "25101:25101"
    volumes:
      - nctl-keys:/nctl-keys
    healthcheck:
      # Keys must exist AND node must be in Validate state (actively producing blocks)
      test: ["CMD-SHELL", "test -f /nctl-keys/secret_key.pem && curl -sf http://localhost:14101/status | grep -q 'Validate'"]
      interval: 10s
      retries: 36
      start_period: 30s
    command:
      - /bin/bash
      - -c
      - |
        # Run the startup script but kill the tail -f at the end
        # by running it in a subshell and intercepting the tail
        bash /home/casper/restart.sh &
        NCTL_PID=$$!

        # Wait for keys to be generated by the setup scripts
        echo "Waiting for keys..."
        until [ -f /home/casper/casper-nctl/assets/net-1/users/user-1/secret_key.pem ]; do
          sleep 2
        done

        echo "Copying keys to shared volume..."
        cp /home/casper/casper-nctl/assets/net-1/users/user-1/secret_key.pem /nctl-keys/secret_key.pem
        cp /home/casper/casper-nctl/assets/net-1/users/user-2/secret_key.pem /nctl-keys/secret_key_1.pem
        cp /home/casper/casper-nctl/assets/net-1/users/user-3/secret_key.pem /nctl-keys/secret_key_2.pem
        cp /home/casper/casper-nctl/assets/net-1/users/user-4/secret_key.pem /nctl-keys/secret_key_3.pem
        cp /home/casper/casper-nctl/assets/net-1/users/user-5/secret_key.pem /nctl-keys/secret_key_4.pem
        echo "Keys ready."

        # Keep waiting on the nctl process
        wait $$NCTL_PID

  # ── One-shot deployer ─────────────────────────────────────────────────────
  deployer:
    networks: [dev]
    command: deployer
    build:
      context: .
    depends_on:
      nctl:
        condition: service_healthy
    volumes:
      - ./wasm:/app/wasm:ro
      - nctl-keys:/nctl-keys:ro            # read user keys
      - deployed:/deployed            # write contract address
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      ODRA_LOG_LEVEL: debug
      ODRA_CASPER_LIVENET_NODE_ADDRESS: http://nctl:11101
      ODRA_CASPER_LIVENET_CHAIN_NAME: casper-net-1
      ODRA_CASPER_LIVENET_EVENTS_URL: http://nctl:18101/events
      ODRA_CASPER_LIVENET_SECRET_KEY_PATH: /nctl-keys/secret_key.pem
      ODRA_CASPER_LIVENET_KEY_1: /nctl-keys/secret_key_1.pem
      X402_CONTRACT_ADDRESS_FILE: /deployed/contract_package_hash

  # ── Facilitator HTTP service ──────────────────────────────────────────────
  facilitator:
    command:
      - /bin/bash
      - -c
      - |
        # Read contract address written by the deployer
        echo "[facilitator] Reading contract address from $${X402_CONTRACT_ADDRESS_FILE}..."
        export X402_TOKEN_ADDRESS="$$(cat $${X402_CONTRACT_ADDRESS_FILE})"
        echo "[facilitator] Using contract address: $${X402_TOKEN_ADDRESS}"
        facilitator
    build:
      context: .
    networks: [dev]
    depends_on:
      deployer:
        condition: service_completed_successfully
    volumes:
      - nctl-keys:/nctl-keys:ro         # user-1 secret key for on-chain calls
      - deployed:/deployed:ro # contract package hash written by deployer
    ports:
      - "3001:3001"
    environment:
      ODRA_CASPER_LIVENET_NODE_ADDRESS: http://nctl:11101
      ODRA_CASPER_LIVENET_CHAIN_NAME: casper-net-1
      ODRA_CASPER_LIVENET_EVENTS_URL: http://nctl:18101/events
      ODRA_CASPER_LIVENET_SECRET_KEY_PATH: /nctl-keys/secret_key_4.pem
      X402_CONTRACT_ADDRESS_FILE: /deployed/contract_package_hash
      PORT: 3001

volumes:
  nctl-assets:   # nctl network assets (keys, configs)
  nctl-keys:          # user-1 and user-2 secret keys (written by deployer)
  deployed:      # contract_package_hash file (written by deployer)
